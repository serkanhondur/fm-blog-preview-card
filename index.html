<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main>
  <article class="card">
    <header class="card-header">
      <img src="./assets/images/illustration-article.svg" alt="Abstract HTML & CSS illustrations" alt="Illustration for the blog article" class="card-img">
    </header>

    <div class="card-body">
      <span class="category">Learning</span>

      <p class="publish-date">Published 21 Dec 2023</p>

      <h1 class="card-title">
        <a href="#">HTML & CSS foundations</a>
      </h1>

      <p class="card-description">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
    </div>

    <footer class="card-footer">
      <img src="assets/images/image-avatar.webp" alt="Greg Hooper" class="avatar">
      <span class="author-name">Greg Hooper</span>
    </footer>
  </article>
</main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Serkan Onur</a>.
  </footer>
</body>
</html>
